<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Location</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 40px 20px;
            max-width: 400px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--tg-theme-button-color, #0088cc);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .status-text {
            font-size: 16px;
            color: var(--tg-theme-hint-color, #999);
            margin-top: 20px;
        }
        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <h1 id="loadingTitle">📍 Requesting location...</h1>
            <div class="spinner"></div>
            <p class="status-text" id="loadingText">Please wait</p>
        </div>

        <div id="success" style="display: none;">
            <div class="icon">✅</div>
            <h1 id="successTitle">Location Shared!</h1>
        </div>

        <div id="error" style="display: none;">
            <div class="icon" id="errorIcon">❌</div>
            <h1 id="errorTitle">Error</h1>
            <p class="status-text" id="errorText">Please try again</p>
        </div>
    </div>
    <script>
        const MAIN_WEBHOOK_URL = 'https://n8n.la-renting.com/webhook/0b58bdb2-bf32-4b48-8a2a-0539359cb88e';

        let tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const telegramUser = tg.initDataUnsafe?.user;
        const urlParams = new URLSearchParams(window.location.search);
        const language = urlParams.get('lang') || 'en';

        const translations = {
            en: {
                requesting: '📍 Requesting location...',
                sending: '📡 Sending location...',
                retrying: '🔄 Retrying...',
                pleaseWait: 'Please wait',
                successTitle: 'Location Shared!',
                errorTitle: 'Error',
                errors: {
                    PERMISSION_DENIED: 'Location access denied',
                    POSITION_UNAVAILABLE: 'Location unavailable',
                    TIMEOUT: 'Location timed out',
                    NETWORK_ERROR: 'Connection failed'
                }
            },
            de: {
                requesting: '📍 Standort wird angefordert...',
                sending: '📡 Standort wird gesendet...',
                retrying: '🔄 Erneuter Versuch...',
                pleaseWait: 'Bitte warten',
                successTitle: 'Standort geteilt!',
                errorTitle: 'Fehler',
                errors: {
                    PERMISSION_DENIED: 'Standortzugriff verweigert',
                    POSITION_UNAVAILABLE: 'Standort nicht verfügbar',
                    TIMEOUT: 'Standortanfrage abgelaufen',
                    NETWORK_ERROR: 'Verbindung fehlgeschlagen'
                }
            },
            ru: {
                requesting: '📍 Запрос местоположения...',
                sending: '📡 Отправка местоположения...',
                retrying: '🔄 Повторная попытка...',
                pleaseWait: 'Пожалуйста, подождите',
                successTitle: 'Местоположение отправлено!',
                errorTitle: 'Ошибка',
                errors: {
                    PERMISSION_DENIED: 'Доступ к геолокации запрещён',
                    POSITION_UNAVAILABLE: 'Местоположение недоступно',
                    TIMEOUT: 'Время запроса истекло',
                    NETWORK_ERROR: 'Ошибка соединения'
                }
            },
            uk: {
                requesting: '📍 Запит місцезнаходження...',
                sending: '📡 Надсилання місцезнаходження...',
                retrying: '🔄 Повторна спроба...',
                pleaseWait: 'Будь ласка, зачекайте',
                successTitle: 'Місцезнаходження надіслано!',
                errorTitle: 'Помилка',
                errors: {
                    PERMISSION_DENIED: 'Доступ до геолокації заборонено',
                    POSITION_UNAVAILABLE: 'Місцезнаходження недоступне',
                    TIMEOUT: 'Час запиту вичерпано',
                    NETWORK_ERROR: 'Помилка з\'єднання'
                }
            },
            ro: {
                requesting: '📍 Se solicită locația...',
                sending: '📡 Se trimite locația...',
                retrying: '🔄 Se reîncearcă...',
                pleaseWait: 'Vă rugăm să așteptați',
                successTitle: 'Locație trimisă!',
                errorTitle: 'Eroare',
                errors: {
                    PERMISSION_DENIED: 'Acces la locație refuzat',
                    POSITION_UNAVAILABLE: 'Locație indisponibilă',
                    TIMEOUT: 'Solicitare locație expirată',
                    NETWORK_ERROR: 'Conexiune eșuată'
                }
            }
        };

        const t = translations[language] || translations.en;

        document.getElementById('loadingTitle').textContent = t.requesting;
        document.getElementById('loadingText').textContent = t.pleaseWait;
        document.getElementById('successTitle').textContent = t.successTitle;
        document.getElementById('errorTitle').textContent = t.errorTitle;

        function getUrlParams() {
            const startappFromUrl = urlParams.get('startapp');
            const resumeFromUrl = urlParams.get('resume');
            const tgStartParam = tg.initDataUnsafe?.start_param;
            return {
                startParam: startappFromUrl || tgStartParam,
                resumeUrl: resumeFromUrl ? decodeURIComponent(resumeFromUrl) : null
            };
        }

        function parseStartParam(startParam) {
            if (!startParam) return { jobId: null, locationType: null };
            if (startParam.includes('-start')) return { jobId: startParam.replace('-start', ''), locationType: 'start' };
            if (startParam.includes('-stop')) return { jobId: startParam.replace('-stop', ''), locationType: 'stop' };
            if (startParam.includes('_start')) return { jobId: startParam.replace('_start', ''), locationType: 'start' };
            if (startParam.includes('_stop')) return { jobId: startParam.replace('_stop', ''), locationType: 'stop' };
            return { jobId: startParam, locationType: null };
        }

        const { startParam, resumeUrl } = getUrlParams();
        const waitingWebhookUrl = resumeUrl;
        const { jobId, locationType } = parseStartParam(startParam) || {};

        let gpsAttempts = 0;
        const MAX_GPS_ATTEMPTS = 2;

        function showSuccess() {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('success').style.display = 'block';
            setTimeout(() => tg.close(), 1500);
        }

        function showError(errorCode) {
            const errorIcons = {
                PERMISSION_DENIED: '🚫',
                POSITION_UNAVAILABLE: '❌',
                TIMEOUT: '⚠️',
                NETWORK_ERROR: '📡'
            };
            document.getElementById('loading').style.display = 'none';
            document.getElementById('error').style.display = 'block';
            document.getElementById('errorIcon').textContent = errorIcons[errorCode] || '❌';
            document.getElementById('errorText').textContent = t.errors[errorCode] || t.errors.NETWORK_ERROR;
            setTimeout(() => tg.close(), 3000);
        }

        async function getLocation() {
            gpsAttempts++;
            document.getElementById('loadingTitle').textContent = gpsAttempts > 1 ? t.retrying : t.requesting;

            if (!navigator.geolocation) { showError('POSITION_UNAVAILABLE'); return; }

            navigator.geolocation.getCurrentPosition(
                sendLocation,
                handleLocationError,
                { enableHighAccuracy: gpsAttempts === 1, timeout: 30000, maximumAge: 0 }
            );
        }

        async function sendLocation(position) {
            document.getElementById('loadingTitle').textContent = t.sending;

            const locationData = {
                job_id: jobId,
                location_type: locationType,
                telegram_user_id: telegramUser?.id || null,
                telegram_username: telegramUser?.username || null,
                telegram_first_name: telegramUser?.first_name || null,
                telegram_last_name: telegramUser?.last_name || null,
                latitude: position.coords.latitude,
                longitude: position.coords.longitude,
                accuracy: position.coords.accuracy,
                timestamp: new Date().toISOString(),
                source: 'telegram_mini_app',
                waiting_webhook_url: waitingWebhookUrl || null
            };

            try {
                const response = await fetch(MAIN_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(locationData),
                    mode: 'cors'
                });

                if (waitingWebhookUrl) {
                    fetch(waitingWebhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: 'completed', location_received: true, success: true, ...locationData })
                    }).catch(() => {});
                }

                if (response.ok) {
                    showSuccess();
                } else {
                    throw new Error(`Server returned ${response.status}`);
                }
            } catch (error) {
                if (waitingWebhookUrl) {
                    fetch(waitingWebhookUrl, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: 'failed', location_received: false, error: error.message })
                    }).catch(() => {});
                }
                showError('NETWORK_ERROR');
            }
        }

        function handleLocationError(error) {
            const codeMap = { 1: 'PERMISSION_DENIED', 2: 'POSITION_UNAVAILABLE', 3: 'TIMEOUT' };
            const errorCode = codeMap[error.code] || 'POSITION_UNAVAILABLE';

            if (error.code === 3 && gpsAttempts < MAX_GPS_ATTEMPTS) {
                document.getElementById('loadingTitle').textContent = t.retrying;
                setTimeout(() => getLocation(), 1000);
                return;
            }

            if (waitingWebhookUrl) {
                fetch(waitingWebhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: 'failed', location_received: false, error: errorCode })
                }).catch(() => {});
            }

            showError(errorCode);
        }

        setTimeout(() => getLocation(), 500);
    </script>
</body>
</html>
